<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Invitación Premium</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #f3d6db;
    overflow-x: hidden;
}

/* 🔒 PANTALLA BLOQUEO */
#lock {
    position: fixed;
    width: 100%;
    height: 100%;
    background: #e8cfd3;
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 9999;
    flex-direction: column;
}

#lock input {
    padding: 10px;
    border-radius: 10px;
    border: none;
}

#lock button {
    margin-top: 10px;
    padding: 10px;
    border: none;
    border-radius: 10px;
}

/* VIDEO */
.video {
    width: 100%;
    border-radius: 20px;
    margin-bottom: 20px;
}

/* CONTENEDOR */
.container {
    max-width: 420px;
    margin: auto;
    padding: 10px;
}

/* TARJETAS */
.card {
    width: 100%;
    border-radius: 20px;
    margin-bottom: 20px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    opacity: 0;
    transform: translateY(40px);
    transition: 1s;
}

.card.show {
    opacity: 1;
    transform: translateY(0);
}

/* GALERÍA */
.gallery {
    display: flex;
    overflow-x: scroll;
    gap: 10px;
}

.gallery img {
    width: 80%;
    border-radius: 15px;
}

/* CONTADOR */
.contador {
    background: #a8e6cf;
    padding: 20px;
    border-radius: 20px;
    text-align: center;
    color: white;
}

#countdown {
    font-size: 20px;
    margin-top: 10px;
}

/* BOTONES */
.btn {
    display: block;
    margin: 15px auto;
    padding: 12px;
    width: 70%;
    background: #7ed6c1;
    color: white;
    border-radius: 30px;
    text-align: center;
    text-decoration: none;
}

/* WHATSAPP */
.whatsapp {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: #25D366;
    padding: 15px;
    border-radius: 50%;
    color: white;
    text-decoration: none;
}

/* PARTÍCULAS */
canvas {
    position: fixed;
    top: 0;
    pointer-events: none;
}
</style>
</head>

<body>

<!-- 🔒 BLOQUEO -->
<div id="lock">
    <h2>Ingresar invitación</h2>
    <input id="pass" placeholder="Código">
    <button onclick="unlock()">Entrar</button>
</div>

<canvas id="particles"></canvas>

<!-- 🎵 MUSICA -->
<audio id="music" loop>
<source src="img/musica.mp3">
</audio>

<div class="container">

<!-- 🎥 VIDEO -->
<video class="video" autoplay muted loop>
<source src="img/video.mp4">
</video>

<!-- 📸 PORTADA -->
<img src="img/portada.jpg" class="card">

<!-- 💬 MENSAJE -->
<img src="img/mensaje.jpg" class="card">

<!-- ⏳ CONTADOR -->
<div class="contador card">
<h2>Falta para el gran día</h2>
<div id="countdown"></div>
</div>

<!-- 📸 GALERÍA -->
<div class="gallery card">
<img src="img/1.jpg">
<img src="img/2.jpg">
<img src="img/3.jpg">
</div>

<!-- 📍 CIVIL -->
<img src="img/civil.jpg" class="card">
<a class="btn" href="https://maps.google.com/?q=Pio+XII+167+Puerto+Vilelas">Cómo llegar</a>

<!-- ⛪ CEREMONIA -->
<img src="img/ceremonia.jpg" class="card">
<a class="btn" href="https://maps.google.com/?q=Santuario+Inmaculada+Concepcion">Cómo llegar</a>

<!-- 🎉 FIESTA -->
<img src="img/fiesta.jpg" class="card">
<a class="btn" href="https://maps.google.com/?q=Salon+Gauna">Cómo llegar</a>

</div>

<!-- 📩 WHATSAPP -->
<a class="whatsapp" href="https://wa.me/549XXXXXXXXXX?text=Confirmo%20asistencia">✔</a>

<script>
// 🔒 DESBLOQUEO
function unlock(){
    if(document.getElementById("pass").value == "2026"){
        document.getElementById("lock").style.display = "none";
        document.getElementById("music").play();
    }
}

// ⏳ CONTADOR
const fecha = new Date("May 9, 2026 21:30:00").getTime();

setInterval(()=>{
let now = new Date().getTime();
let d = fecha - now;

let dias = Math.floor(d/(1000*60*60*24));
let h = Math.floor((d%(1000*60*60*24))/(1000*60*60));
let m = Math.floor((d%(1000*60*60))/(1000*60));
let s = Math.floor((d%(1000*60))/1000);

document.getElementById("countdown").innerHTML =
`${dias}d ${h}h ${m}m ${s}s`;
},1000);

// ANIMACIÓN
const els = document.querySelectorAll(".card");

window.addEventListener("scroll", ()=>{
els.forEach(el=>{
if(el.getBoundingClientRect().top < window.innerHeight*0.9){
el.classList.add("show");
}
});
});

// ✨ PARTÍCULAS
const canvas = document.getElementById("particles");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let p = [];

for(let i=0;i<60;i++){
p.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height,r:Math.random()*3});
}

function draw(){
ctx.clearRect(0,0,canvas.width,canvas.height);
ctx.fillStyle="rgba(212,175,55,0.7)";
p.forEach(e=>{
ctx.beginPath();
ctx.arc(e.x,e.y,e.r,0,Math.PI*2);
ctx.fill();
e.y+=1;
if(e.y>canvas.height)e.y=0;
});
requestAnimationFrame(draw);
}
draw();
</script>

</body>
</html>
