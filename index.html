<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Invitación</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: linear-gradient(#f3d6db, #e8cfd3);
    overflow-x: hidden;
}

/* CONTENEDOR */
.container {
    max-width: 420px;
    margin: auto;
    padding: 10px;
}

/* PORTADA */
.portada {
    position: relative;
}

/* TARJETAS */
.card {
    width: 100%;
    border-radius: 20px;
    margin-bottom: 20px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    opacity: 0;
    transform: translateY(40px) scale(0.95);
    transition: all 1s ease;
}

.card.show {
    opacity: 1;
    transform: translateY(0) scale(1);
}

/* ===== BOTON NIVEL DIOS ===== */
#playBtn {
    position: absolute;
    bottom: 25px;
    left: 50%;
    transform: translateX(-50%);
    background: none;
    border: none;
    cursor: pointer;
    z-index: 10;
}

/* CONTENEDOR SVG */
.play-svg {
    width: 110px;
    height: 110px;
    filter: drop-shadow(0 10px 20px rgba(0,0,0,0.4));
    animation: float 3s ease-in-out infinite;
}

/* EFECTO LATIDO SUAVE */
@keyframes float {
    0% { transform: scale(1); }
    50% { transform: scale(1.07); }
    100% { transform: scale(1); }
}

/* CLICK REALISTA */
#playBtn:active .play-svg {
    transform: scale(0.9);
    filter: drop-shadow(0 5px 10px rgba(0,0,0,0.5));
}

/* CONTADOR */
.contador {
    background: #a8e6cf;
    border-radius: 20px;
    padding: 20px;
    text-align: center;
    color: white;
    margin-bottom: 20px;
    opacity: 0;
    transform: translateY(40px);
    transition: 1s;
}

.contador.show {
    opacity: 1;
    transform: translateY(0);
}

#countdown {
    font-size: 22px;
    font-weight: bold;
}

/* BOTONES */
.btn {
    display: block;
    margin: 15px auto;
    padding: 12px 20px;
    background: linear-gradient(45deg, #a8e6cf, #7ed6c1);
    color: white;
    border-radius: 30px;
    text-decoration: none;
    text-align: center;
    width: 70%;
}

/* WHATSAPP */
.whatsapp {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: #25D366;
    color: white;
    padding: 14px 20px;
    border-radius: 30px;
    text-decoration: none;
}

/* PARTICULAS */
canvas {
    position: fixed;
    top: 0;
    left: 0;
    pointer-events: none;
}
</style>
</head>

<body>

<canvas id="particles"></canvas>

<audio id="musica" loop>
    <source src="img/MusicaLili.mp3" type="audio/mpeg">
</audio>

<div class="container">

<!-- PORTADA -->
<div class="portada">
    <img src="img/portada.jpg" class="card">

    <!-- BOTON REALISTA SVG -->
    <button id="playBtn">
        <svg class="play-svg" viewBox="0 0 200 200">

            <!-- TEXTO CURVO -->
            <defs>
                <path id="curve" d="M 40,100 A 60,60 0 0,1 160,100" />
            </defs>

            <text font-size="16" fill="#3e4a42" font-weight="bold" letter-spacing="3">
                <textPath href="#curve" startOffset="50%" text-anchor="middle">
                    DALE PLAY
                </textPath>
            </text>

            <!-- CIRCULO -->
            <circle cx="100" cy="110" r="50"
                fill="url(#grad)" />

            <!-- GRADIENTE -->
            <defs>
                <radialGradient id="grad">
                    <stop offset="0%" stop-color="#9bb8a5"/>
                    <stop offset="100%" stop-color="#4f6f5c"/>
                </radialGradient>
            </defs>

            <!-- BRILLO -->
            <ellipse cx="85" cy="85" rx="25" ry="15"
                fill="rgba(255,255,255,0.4)"/>

            <!-- TRIANGULO -->
            <polygon points="95,90 95,130 125,110"
                fill="white"/>
        </svg>
    </button>

</div>

<img src="img/11.jpg" class="card">

<div class="contador">
    <h2>Falta para el gran día</h2>
    <div id="countdown"></div>
</div>

<img src="img/2.jpg" class="card">
<a class="btn" href="https://maps.google.com/?q=Pio+XII+167+Puerto+Vilelas" target="_blank">Cómo llegar</a>

<img src="img/Foto.jpg" class="card">
<a class="btn" href="https://maps.google.com/?q=Santuario+Inmaculada+Concepcion+Barranqueras" target="_blank">Cómo llegar</a>

<img src="img/4.jpg" class="card">
<img src="img/5.jpg" class="card">
<img src="img/6.jpg" class="card">
<img src="img/7.jpg" class="card">

<img src="img/8.jpg" class="card">  
<img src="img/9.jpg" class="card">

<img src="img/RubenyLili.png" class="card">
<a class="btn" href="https://maps.google.com/?q=Salon+Gauna+Puerto+Vilelas" target="_blank">Cómo llegar</a>

</div>

<a href="https://wa.me/549XXXXXXXXXX?text=Confirmo%20mi%20asistencia%20a%20la%20boda" class="whatsapp">
Confirmar
</a>

<script>
// AUDIO
const btn = document.getElementById("playBtn");
const audio = document.getElementById("musica");

btn.onclick = () => {
    if (audio.paused) {
        audio.play();
    } else {
        audio.pause();
    }
};

// CONTADOR
const fecha = new Date("May 9, 2026 21:30:00").getTime();

setInterval(() => {
    const ahora = new Date().getTime();
    const d = fecha - ahora;

    let dias = Math.floor(d / (1000*60*60*24));
    let h = Math.floor((d%(1000*60*60*24))/(1000*60*60));
    let m = Math.floor((d%(1000*60*60))/(1000*60));
    let s = Math.floor((d%(1000*60))/1000);

    document.getElementById("countdown").innerHTML =
        `${dias}d ${h}h ${m}m ${s}s`;
}, 1000);

// SCROLL
const els = document.querySelectorAll(".card, .contador");

const show = () => {
    const t = window.innerHeight * 0.85;
    els.forEach(el => {
        if (el.getBoundingClientRect().top < t) {
            el.classList.add("show");
        }
    });
};

window.addEventListener("scroll", show);
window.addEventListener("load", show);

// PARTICULAS
const canvas = document.getElementById("particles");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];

for (let i = 0; i < 50; i++) {
    particles.push({
        x: Math.random()*canvas.width,
        y: Math.random()*canvas.height,
        r: Math.random()*3,
        d: Math.random()*2
    });
}

function draw() {
    ctx.clearRect(0,0,canvas.width,canvas.height);
    ctx.fillStyle = "rgba(212,175,55,0.6)";

    particles.forEach(p => {
        ctx.beginPath();
        ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
        ctx.fill();

        p.y += p.d;
        if (p.y > canvas.height) p.y = 0;
    });

    requestAnimationFrame(draw);
}

draw();
</script>

</body>
</html>
