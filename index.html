<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Invitación</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: linear-gradient(#f3d6db, #e8cfd3);
    overflow-x: hidden;
}

/* CONTENEDOR */
.container {
    max-width: 420px;
    margin: auto;
    padding: 10px;
}

/* TARJETAS */
.card {
    width: 100%;
    border-radius: 20px;
    margin-bottom: 20px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    opacity: 0;
    transform: translateY(40px) scale(0.95);
    transition: all 1s ease;
}

.card.show {
    opacity: 1;
    transform: translateY(0) scale(1);
}

/* PORTADA */
.portada {
    position: relative;
}

/* ===== BOTON PLAY ===== */
#playBtn {
    position: absolute;
    bottom: 25px;
    left: 50%;
    transform: translateX(-50%);
    background: none;
    border: none;
    cursor: pointer;
    z-index: 10;
}

.play-svg {
    width: 110px;
    height: 110px;
    filter: drop-shadow(0 10px 20px rgba(0,0,0,0.4));
    animation: pulse 3s infinite;
}

@keyframes pulse {
    0% { transform: scale(1); }
    50% { transform: scale(1.08); }
    100% { transform: scale(1); }
}

/* ===== CONTADOR SOBRE IMAGEN ===== */
.card-con-contador {
    position: relative;
}

/* CAJA CONTADOR */
#countdownBox {
    position: absolute;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    
    padding: 12px 25px;
    border-radius: 40px;

    background: rgba(0,0,0,0.45);
    backdrop-filter: blur(8px);

    color: white;
    text-align: center;
    font-weight: bold;

    box-shadow: 0 8px 20px rgba(0,0,0,0.4);

    overflow: hidden;
}

/* TEXTO */
#countdown {
    font-size: 20px;
    letter-spacing: 1px;
}

/* CORAZONES */
#hearts {
    position: absolute;
    width: 100%;
    height: 100%;
    bottom: 0;
    left: 0;
    pointer-events: none;
}

.heart {
    position: absolute;
    bottom: 0;
    font-size: 14px;
    animation: floatUp 3s linear forwards;
}

@keyframes floatUp {
    0% {
        transform: translateY(0) scale(1);
        opacity: 1;
    }
    100% {
        transform: translateY(-80px) scale(1.5);
        opacity: 0;
    }
}

/* BOTONES */
.btn {
    display: block;
    margin: 15px auto;
    padding: 12px 20px;
    background: linear-gradient(45deg, #a8e6cf, #7ed6c1);
    color: white;
    border-radius: 30px;
    text-decoration: none;
    text-align: center;
    width: 70%;
}

/* WHATSAPP */
.whatsapp {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: #25D366;
    color: white;
    padding: 14px 20px;
    border-radius: 30px;
    text-decoration: none;
}

/* PARTICULAS */
canvas {
    position: fixed;
    top: 0;
    left: 0;
    pointer-events: none;
}
</style>
</head>

<body>

<canvas id="particles"></canvas>

<audio id="musica" loop>
    <source src="img/MusicaLili.mp3" type="audio/mpeg">
</audio>

<div class="container">

<!-- PORTADA -->
<div class="portada">
    <img src="img/portada.jpg" class="card">

    <button id="playBtn">
        <svg class="play-svg" viewBox="0 0 200 200">
            <defs>
                <path id="curve" d="M 40,100 A 60,60 0 0,1 160,100" />
            </defs>

            <text font-size="16" fill="#3e4a42" font-weight="bold" letter-spacing="3">
                <textPath href="#curve" startOffset="50%" text-anchor="middle">
                    DALE PLAY
                </textPath>
            </text>

            <defs>
                <radialGradient id="grad">
                    <stop offset="0%" stop-color="#9bb8a5"/>
                    <stop offset="100%" stop-color="#4f6f5c"/>
                </radialGradient>
            </defs>

            <circle cx="100" cy="110" r="50" fill="url(#grad)" />
            <ellipse cx="85" cy="85" rx="25" ry="15" fill="rgba(255,255,255,0.4)"/>
            <polygon points="95,90 95,130 125,110" fill="white"/>
        </svg>
    </button>
</div>

<img src="img/11.jpg" class="card">
<img src="img/Foto.jpg" class="card">

<!-- IMAGEN CON CONTADOR -->
<div class="card-con-contador">
    <img src="img/2.jpg" class="card show">
    
    <div id="countdownBox">
        <div id="countdown"></div>
        <div id="hearts"></div>
    </div>
</div>

<a class="btn" href="#">Cómo llegar</a>

</div>

<a href="#" class="whatsapp">Confirmar</a>

<script>
// AUDIO
const btn = document.getElementById("playBtn");
const audio = document.getElementById("musica");

btn.onclick = () => {
    if (audio.paused) audio.play();
    else audio.pause();
};

// CONTADOR FECHA CORRECTA
const fecha = new Date("May 9, 2026 21:00:00").getTime();

setInterval(() => {
    const ahora = new Date().getTime();
    const d = fecha - ahora;

    let dias = Math.floor(d / (1000*60*60*24));
    let h = Math.floor((d%(1000*60*60*24))/(1000*60*60));
    let m = Math.floor((d%(1000*60*60))/(1000*60));
    let s = Math.floor((d%(1000*60))/1000);

    document.getElementById("countdown").innerHTML =
        `${dias}d ${h}h ${m}m ${s}s`;
}, 1000);

// CORAZONES FLOTANDO
function createHeart() {
    const heart = document.createElement("div");
    heart.classList.add("heart");
    heart.innerHTML = "❤️";

    heart.style.left = Math.random() * 100 + "%";
    heart.style.fontSize = (12 + Math.random() * 10) + "px";

    document.getElementById("hearts").appendChild(heart);

    setTimeout(() => {
        heart.remove();
    }, 3000);
}

setInterval(createHeart, 400);

// SCROLL ANIMACION
const els = document.querySelectorAll(".card");

const show = () => {
    const t = window.innerHeight * 0.85;
    els.forEach(el => {
        if (el.getBoundingClientRect().top < t) {
            el.classList.add("show");
        }
    });
};

window.addEventListener("scroll", show);
window.addEventListener("load", show);

// PARTICULAS
const canvas = document.getElementById("particles");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];

for (let i = 0; i < 50; i++) {
    particles.push({
        x: Math.random()*canvas.width,
        y: Math.random()*canvas.height,
        r: Math.random()*3,
        d: Math.random()*2
    });
}

function draw() {
    ctx.clearRect(0,0,canvas.width,canvas.height);
    ctx.fillStyle = "rgba(212,175,55,0.6)";

    particles.forEach(p => {
        ctx.beginPath();
        ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
        ctx.fill();

        p.y += p.d;
        if (p.y > canvas.height) p.y = 0;
    });

    requestAnimationFrame(draw);
}

draw();
</script>

</body>
</html>
