<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Invitación</title>

<style>
body {
    margin: 0;
    background: #e8cfd3;
    font-family: Arial;
    overflow-x: hidden;
}

.container {
    max-width: 420px;
    margin: auto;
    padding: 10px;
}

.card {
    width: 100%;
    border-radius: 20px;
    margin-bottom: 20px;
    box-shadow: 0px 10px 25px rgba(0,0,0,0.15);
    transform: scale(0.95);
    opacity: 0;
    transition: all 0.8s ease;
}

.card.show {
    transform: scale(1);
    opacity: 1;
}

.contador {
    background: #a8e6cf;
    border-radius: 20px;
    padding: 20px;
    text-align: center;
    color: white;
    margin-bottom: 20px;
    opacity: 0;
    transform: translateY(20px);
    transition: 0.8s;
}

.contador.show {
    opacity: 1;
    transform: translateY(0);
}

#countdown {
    font-size: 20px;
    margin-top: 10px;
}

#playBtn {
    position: fixed;
    top: 15px;
    right: 15px;
    background: gold;
    border: none;
    border-radius: 50%;
    width: 50px;
    height: 50px;
    font-size: 18px;
    z-index: 1000;
}

.whatsapp {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: #25D366;
    color: white;
    padding: 12px 18px;
    border-radius: 30px;
    text-decoration: none;
    font-size: 14px;
}
</style>

</head>
<body>

<!-- 🎵 Música -->
<audio id="musica" loop>
    <source src="img/musica.mp3" type="audio/mpeg">
</audio>

<button id="playBtn">▶</button>

<div class="container">

    <img src="img/portada.jpg" class="card">
    <img src="img/mensaje.jpg" class="card">

    <div class="contador">
        <h2>Falta para el gran día</h2>
        <div id="countdown">Cargando...</div>
    </div>

    <img src="img/civil.jpg" class="card">
    <img src="img/ceremonia.jpg" class="card">
    <img src="img/fiesta.jpg" class="card">

</div>

<!-- WhatsApp -->
<a href="https://wa.me/549XXXXXXXXXX" class="whatsapp" target="_blank">
    Confirmar asistencia
</a>

<script>
// 🎵 Música
const btn = document.getElementById("playBtn");
const audio = document.getElementById("musica");

btn.addEventListener("click", () => {
    if (audio.paused) {
        audio.play();
        btn.innerHTML = "⏸";
    } else {
        audio.pause();
        btn.innerHTML = "▶";
    }
});

// ⏳ Contador
const fecha = new Date("May 9, 2026 21:30:00").getTime();

setInterval(() => {
    const ahora = new Date().getTime();
    const diferencia = fecha - ahora;

    let dias = Math.floor(diferencia / (1000 * 60 * 60 * 24));
    let horas = Math.floor((diferencia % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
    let minutos = Math.floor((diferencia % (1000 * 60 * 60)) / (1000 * 60));
    let segundos = Math.floor((diferencia % (1000 * 60)) / 1000);

    document.getElementById("countdown").innerHTML =
        dias + "d " + horas + "h " + minutos + "m " + segundos + "s";
}, 1000);

// 🎬 Animación scroll
const elementos = document.querySelectorAll(".card, .contador");

const mostrar = () => {
    const trigger = window.innerHeight * 0.9;

    elementos.forEach(el => {
        const top = el.getBoundingClientRect().top;

        if (top < trigger) {
            el.classList.add("show");
        }
    });
};

window.addEventListener("scroll", mostrar);
window.addEventListener("load", mostrar);
</script>

</body>
</html>
