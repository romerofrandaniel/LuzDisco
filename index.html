<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Invitación</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: linear-gradient(#f3d6db, #e8cfd3);
    overflow-x: hidden;
}

/* CONTENEDOR */
.container {
    max-width: 420px;
    margin: auto;
    padding: 10px;
}

/* TARJETAS */
.card {
    width: 100%;
    border-radius: 20px;
    margin-bottom: 20px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    opacity: 0;
    transform: translateY(40px) scale(0.95);
    transition: all 1s ease;
}

.card.show {
    opacity: 1;
    transform: translateY(0) scale(1);
}

/* CONTADOR */
.contador {
    background: #a8e6cf;
    border-radius: 20px;
    padding: 20px;
    text-align: center;
    color: white;
    margin-bottom: 20px;
    opacity: 0;
    transform: translateY(40px);
    transition: 1s;
}

.contador.show {
    opacity: 1;
    transform: translateY(0);
}

#countdown {
    font-size: 22px;
    font-weight: bold;
}

/* BOTONES */
.btn {
    display: block;
    margin: 15px auto;
    padding: 12px 20px;
    background: linear-gradient(45deg, #a8e6cf, #7ed6c1);
    color: white;
    border-radius: 30px;
    text-decoration: none;
    text-align: center;
    width: 70%;
}

/* MUSICA */
#playBtn {
    position: fixed;
    top: 15px;
    right: 15px;
    background: gold;
    border: none;
    border-radius: 50%;
    width: 55px;
    height: 55px;
    font-size: 20px;
    z-index: 1000;
}

/* WHATSAPP */
.whatsapp {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: #25D366;
    color: white;
    padding: 14px 20px;
    border-radius: 30px;
    text-decoration: none;
}

/* PARTÍCULAS */
canvas {
    position: fixed;
    top: 0;
    left: 0;
    pointer-events: none;
}
</style>

</head>
<body>

<canvas id="particles"></canvas>

<audio id="musica" loop>
    <source src="img/musica.mp3" type="audio/mpeg">
</audio>

<button id="playBtn">▶</button>

<div class="container">

<img src="img/portada.jpg" class="card">
<img src="img/LiliCasamiento.png" class="card">


<div class="contador">
    <h2>Falta para el gran día</h2>
    <div id="countdown"></div>
</div>

<img src="img/civil.jpg" class="card">
<a class="btn" href="https://maps.google.com/?q=Pio+XII+167+Puerto+Vilelas" target="_blank">Cómo llegar</a>

<img src="img/ceremonia.jpg" class="card">
<a class="btn" href="https://maps.google.com/?q=Santuario+Inmaculada+Concepcion+Barranqueras" target="_blank">Cómo llegar</a>


<img src="img/AsistenciaEjemplo.jpg" class="card">

<img src="img/regalo.jpg" class="card">
<img src="img/Ropa.jpg" class="card">
<img src="img/CompartirFotos.jpg" class="card">

    
<img src="img/mensaje.jpg" class="card">  
<img src="img/RubenyLili.png" class="card">
<a class="btn" href="https://maps.google.com/?q=Salon+Gauna+Puerto+Vilelas" target="_blank">Cómo llegar</a>

  
    
</div>

    
<a href="https://wa.me/549XXXXXXXXXX?text=Confirmo%20mi%20asistencia%20a%20la%20boda" class="whatsapp">
Confirmar
</a>

<script>
// MUSICA
document.body.addEventListener("click", () => {
    document.getElementById("musica").play();
}, { once: true });

const btn = document.getElementById("playBtn");
const audio = document.getElementById("musica");

btn.onclick = () => {
    if (audio.paused) {
        audio.play();
        btn.innerHTML = "⏸";
    } else {
        audio.pause();
        btn.innerHTML = "▶";
    }
};

// CONTADOR
const fecha = new Date("May 9, 2026 21:30:00").getTime();

setInterval(() => {
    const ahora = new Date().getTime();
    const d = fecha - ahora;

    let dias = Math.floor(d / (1000*60*60*24));
    let h = Math.floor((d%(1000*60*60*24))/(1000*60*60));
    let m = Math.floor((d%(1000*60*60))/(1000*60));
    let s = Math.floor((d%(1000*60))/1000);

    document.getElementById("countdown").innerHTML =
        `${dias}d ${h}h ${m}m ${s}s`;
}, 1000);

// SCROLL ANIMACION
const els = document.querySelectorAll(".card, .contador");

const show = () => {
    const t = window.innerHeight * 0.85;
    els.forEach(el => {
        if (el.getBoundingClientRect().top < t) {
            el.classList.add("show");
        }
    });
};

window.addEventListener("scroll", show);
window.addEventListener("load", show);

// PARTÍCULAS DORADAS
const canvas = document.getElementById("particles");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];

for (let i = 0; i < 50; i++) {
    particles.push({
        x: Math.random()*canvas.width,
        y: Math.random()*canvas.height,
        r: Math.random()*3,
        d: Math.random()*2
    });
}

function draw() {
    ctx.clearRect(0,0,canvas.width,canvas.height);
    ctx.fillStyle = "rgba(212,175,55,0.6)";

    particles.forEach(p => {
        ctx.beginPath();
        ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
        ctx.fill();

        p.y += p.d;
        if (p.y > canvas.height) p.y = 0;
    });

    requestAnimationFrame(draw);
}

draw();
</script>

</body>
</html>
